<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClarkM4a.0 Downloads</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #f4f4f4;
    }
    caption {
      font-size: 1.4em;
      margin-bottom: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>ClarkM4a.0 Sovereign AI Distribution Matrix</h1>
  <div id="table-container"></div>

  <script type="module">

async function loadTable() {
  const res = await fetch('distros.json?v=' + new Date().getTime(), { cache: 'no-store' });
  const data = await res.json();

  const grouped = data.reduce((acc, item) => {
    acc[item.platform] = acc[item.platform] || [];
    acc[item.platform].push(item);
    return acc;
  }, {});

  const container = document.getElementById('table-container');

  for (const platform of Object.keys(grouped)) {
    const section = document.createElement('div');
    section.innerHTML = `<h2>${platform}</h2><table border="1">
      <tr>
        <th>Variant</th><th>Version</th><th>Release Date</th>
        <th>ZIP</th><th>Installer</th>
        <th>Dependencies</th><th>Release Notes</th><th>Notes</th>
      </tr>` + grouped[platform].map(i => `
        <tr>
          <td>${i.variant}</td>
          <td>${i.version}</td>
          <td>${i.release_date}</td>
          <td><a href="${i.zip}">Download</a></td>
          <td><a href="${i.installer}">Install</a></td>
          <td><pre>${Object.entries(i.dependencies).map(([k,v]) => `${k}: ${v}`).join('\n')}</pre></td>
          <td><details><summary>View</summary>${i.release_notes}</details></td>
          <td>${i.notes}</td>
        </tr>
      `).join('') + `</table>`;

    container.appendChild(section);
  }
}

loadTable();

  </script>
</body>

</html>
